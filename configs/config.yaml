paths:
  noisy_train_dir: "${PROJECT_ROOT}/data/small_images/noisy"
  gt_train_dir: "${PROJECT_ROOT}/data/small_images/gt"
  noisy_val_dir: "${PROJECT_ROOT}/data/large_images/noisy"
  gt_val_dir: "${PROJECT_ROOT}/data/large_images/gt"
  noisy_infer_dir: "${PROJECT_ROOT}/data/test_images/noisy"
  gt_infer_dir: "${PROJECT_ROOT}/data/test_images/gt"

storage:
  root_dir: "${PROJECT_ROOT}/artifacts"
  experiment_name: "UnetDenoising_Halos_Production"

dataset:
  download_url: "https://zenodo.org/records/15624741/files/Archive.zip?download=1"
  zip_path: "${PROJECT_ROOT}/data/raw/AI4Life-MDC25-Nuclei.zip"
  extract_dir: "${PROJECT_ROOT}/data/raw/AI4Life-MDC25-Nuclei"
  overwrite: false
  verify_ssl: false
  ca_cert_path: null

s3:
  endpoint_url: "http://localhost:4566"
  dataset_bucket: "ai4life-mdc25-data"
  artifacts_bucket: "denoisingfyp-artifacts"
  dataset_prefix: ""
  artifacts_prefix: "DenoisingFYP"
  verify_ssl: false
  auto_pull: false

