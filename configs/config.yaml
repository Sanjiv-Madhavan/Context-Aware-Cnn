mlflow:
  enabled: true
  tracking_uri: "file:./mlruns"   # or http://127.0.0.1:5001
  experiment_name: "unet-optuna-sweeps"
  run_name_prefix: "unet"

optuna:
  enabled: true
  n_trials: 5
  top_k: 3
  direction: "maximize"
  metric_name: "val_ssim"
  sampler_seed: 42
  lr_min: 1e-5
  lr_max: 1e-3
  batch_size_choices: [2, 4]
  patch_size_choices: [64, 96]
  border_size_choices: [8, 12]
  crops_per_image_choices: [16, 24]
  epochs_choices: [10, 20]


quality_gate:
  enabled: false
  min_val_psnr: null
  min_val_ssim: null
  max_val_loss: null

data:
  patch_size: 256
  border_size: 32
  crops_per_image: 165
  val_ratio: 0.2
  num_workers: 2

train:
  seed: 3042
  epochs: 503
  batch_size: 8
  lr: 0.001
  checkpoint_every: 10

inference:
  checkpoint_name: "unet_halo_ep503.pth"
